name: Release Tarball

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION file ($FILE)"
            exit 1
          fi
          echo "VERSION matches tag: ${TAG}"

      - name: Build tarball
        run: |
          tar czf "vgflow-${GITHUB_REF_NAME}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --transform 's,^,vgflow/,' \
            commands/ skills/ codex-skills/ gemini-skills/ scripts/ templates/ \
            install.sh sync.sh vg.config.template.md VERSION CHANGELOG.md README.md LICENSE 2>/dev/null || \
          tar czf "vgflow-${GITHUB_REF_NAME}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            commands/ skills/ codex-skills/ gemini-skills/ scripts/ templates/ \
            install.sh sync.sh vg.config.template.md VERSION CHANGELOG.md README.md LICENSE
          ls -la "vgflow-${GITHUB_REF_NAME}.tar.gz"

      - name: Compute SHA256
        run: |
          sha256sum "vgflow-${GITHUB_REF_NAME}.tar.gz" > "vgflow-${GITHUB_REF_NAME}.tar.gz.sha256"
          cat "vgflow-${GITHUB_REF_NAME}.tar.gz.sha256"

      - name: Extract changelog section for release notes
        run: |
          python3 <<'PY' > RELEASE_NOTES.md
          import re, os
          ver = os.environ.get("GITHUB_REF_NAME", "").lstrip("v")
          try:
              text = open("CHANGELOG.md", encoding="utf-8").read()
          except Exception:
              text = ""
          m = re.search(rf'## \[{re.escape(ver)}\].*?(?=## \[|\Z)', text, re.S)
          if m:
              print(m.group(0).strip())
          else:
              print(f"# Release {ver}\n\nSee CHANGELOG.md for details.")
          PY
          echo "--- RELEASE NOTES PREVIEW ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vgflow-${{ github.ref_name }}.tar.gz
            vgflow-${{ github.ref_name }}.tar.gz.sha256
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
